<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DFC - التطبيق الرسمي | حمل الآن</title>
    <!-- Google Fonts: نسخة عربية + انجليزية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f8faff 0%, #eef2fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* البطاقة الرئيسية */
        .landing-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* القسم العلوي */
        .hero {
            background: linear-gradient(135deg, #0B2B40 0%, #1C4E6F 100%);
            padding: 2.5rem 2rem 2rem 2rem;
            text-align: center;
            color: white;
            border-bottom-left-radius: 1.5rem;
            border-bottom-right-radius: 1.5rem;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .app-icon i {
            font-size: 3.3rem;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.9;
            max-width: 380px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .badge {
            margin-top: 1rem;
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        /* قسم التحميل */
        .download-section {
            padding: 2.5rem 2rem 2.8rem 2rem;
            text-align: center;
        }

        .qr-preview {
            margin-bottom: 2rem;
        }

        .qr-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #f0f4fe;
            padding: 0.5rem 1.2rem;
            border-radius: 80px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1C4E6F;
            border: 1px solid #cddfed;
        }

        .qr-badge i {
            font-size: 1.2rem;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin: 2rem 0 1rem;
        }

        /* تصميم الأزرار (متاجر) */
        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #1a1e2b;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 220px;
            justify-content: center;
        }

        .store-btn i {
            font-size: 1.8rem;
        }

        .btn-text {
            text-align: right;
            line-height: 1.2;
        }

        .btn-text small {
            font-size: 0.7rem;
            font-weight: 500;
            opacity: 0.85;
            display: block;
            letter-spacing: 0.3px;
        }

        .btn-text span {
            font-size: 1.1rem;
            font-weight: 800;
        }

        /* ألوان خاصة بكل متجر */
        .google-play {
            background: #0f1722;
        }
        .google-play:hover {
            background: #1f2a3e;
            transform: scale(1.02);
            box-shadow: 0 12px 22px rgba(0,0,0,0.15);
        }

        .app-store {
            background: #000000;
        }
        .app-store:hover {
            background: #1c1c2e;
            transform: scale(1.02);
            box-shadow: 0 12px 22px rgba(0,0,0,0.15);
        }

        /* معلومات إضافية */
        .info-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #4b5876;
            background: #eef2fa;
            display: inline-block;
            padding: 0.45rem 1.2rem;
            border-radius: 60px;
        }

        .info-note i {
            margin-left: 6px;
            font-size: 0.75rem;
        }

        hr {
            margin: 1.5rem auto 0;
            width: 60px;
            border: 0;
            height: 2px;
            background: #cddfed;
            border-radius: 2px;
        }

        /* استجابة للجوال */
        @media (max-width: 550px) {
            .hero {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .store-btn {
                width: 100%;
                max-width: 280px;
                padding: 0.8rem 1.2rem;
            }
            .btn-container {
                gap: 1rem;
            }
            .download-section {
                padding: 1.8rem 1.2rem;
            }
            .btn-text {
                text-align: center;
            }
        }

        /* حركات ظهور */
        .landing-card {
            animation: fadeSlideUp 0.5s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="landing-card">
    <div class="hero">
        <div class="app-icon">
            <!-- أيقونة مميزة DFC (شحن / طاقة رقمية) -->
            <i class="fas fa-charging-station"></i>
        </div>
        <h1>DFC</h1>
        <div class="tagline">
            ذكي · سريع · موثوق<br>
            جرب نظام DFC البيئي المتطور
        </div>
        <div class="badge">
            <i class="fas fa-qrcode"></i> امسح الرمز وثبّت التطبيق
        </div>
    </div>

    <div class="download-section">
        <div class="qr-preview">
            <div class="qr-badge">
                <i class="fas fa-mobile-alt"></i>
                <span>تطبيق DFC الرسمي</span>
                <i class="fas fa-arrow-down"></i>
            </div>
        </div>

        <!-- زران التحميل: Google Play و App Store -->
        <div class="btn-container">
            <!-- Google Play -->
            <a href="#" class="store-btn google-play" id="googlePlayBtn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-google-play"></i>
                <div class="btn-text">
                    <small>احصل عليه من</small>
                    <span>Google Play</span>
                </div>
            </a>
            
            <!-- App Store -->
            <a href="#" class="store-btn app-store" id="appStoreBtn" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-apple"></i>
                <div class="btn-text">
                    <small>تحميل من</small>
                    <span>App Store</span>
                </div>
            </a>
        </div>

        <div class="info-note">
            <i class="fas fa-qrcode"></i> امسح رمز QR مرّة أخرى · تحميل آمن
        </div>
        <hr />
        <div style="margin-top: 1.2rem; font-size: 0.7rem; color: #6c7a91;">
            <i class="fas fa-shield-alt"></i> التوزيع الرسمي · DFC الإصدار 3.0
        </div>
    </div>
</div>

<script>
    // روابط حقيقية لمتجر Google Play ومتجر Apple (بناءً على معرفة DFC)
    // يمكن استبدالها بالروابط الفعلية للتطبيق. نضع أمثلة واقعية لتجربة سلسة.
    // (بفرض أن DFC موجود على المتاجر، لكن في حال عدم وجود روابط محددة يتم استخدام روابط توضيحية)
    // لضمان تجربة المستخدم: إذا كان لديك رابط فعلي فضعه مكان placeholder.
    
    // الرابط الحقيقي لمتجر Google Play (مثال توضيحي يحاكي تطبيق DFC، حيث أن DFC معروف)
    // نستخدم رابطًا حقيقيًا لتطبيق DFC في حال كان موجودًا - لكن بشكل آمن نضع رابط demo حقيقي لصفحة DFC إن وجد.
    // ولأنني لا أملك معرفة بالرابط المباشر لـ DFC لكن أذكر أن العميل يعرفه، نضع روابط مثالية قابلة للتعديل فورياً.
    // وسنضيف alert تنبيه للمطور لسهولة التعديل مع الاحتفاظ بوظيفة نموذجية.
    
    // روابط حقيقية قابلة للاستبدال (يمكنك تغييرها بسهولة)
    // للتوضيح: نضع روابط حقيقية لمشاريع نموذجية (لكن يمكن تعديلها من خلال متغيرات).
    const GOOGLE_PLAY_URL = "https://play.google.com/store/apps/details?id=com.dfc.app";   // استبدل برابط DFC الفعلي
    const APP_STORE_URL = "https://apps.apple.com/app/dfc-official/id123456789";            // استبدل بمعرف التطبيق الفعلي
    
    // في حال عدم وجود التطبيق على المتاجر بعد، يمكن تفعيل التنبيه.
    // ولكننا نعطي حرية التعديل المباشر للمستخدم.
    
    const googleBtn = document.getElementById('googlePlayBtn');
    const appleBtn = document.getElementById('appStoreBtn');
    
    // تحديث الروابط الفعلية
    if (googleBtn) {
        googleBtn.href = GOOGLE_PLAY_URL;
        // فحص إضافي: إذا كان الرابط افتراضيًا ولم يتم تعديله، يمكن عرض رسالة للمطور في الكونسول فقط
        googleBtn.addEventListener('click', function(e) {
            if (GOOGLE_PLAY_URL === "https://play.google.com/store/apps/details?id=com.dfc.app" && !GOOGLE_PLAY_URL.includes("dfc")) {
                console.log("🔧 ملاحظة: يرجى تحديث رابط Google Play الخاص بتطبيق DFC الفعلي.");
            }
        });
    }
    
    if (appleBtn) {
        appleBtn.href = APP_STORE_URL;
        appleBtn.addEventListener('click', function(e) {
            if (APP_STORE_URL === "https://apps.apple.com/app/dfc-official/id123456789") {
                console.log("📱 ملاحظة: يرجى تحديث رابط App Store الرسمي لـ DFC.");
            }
        });
    }
    
    // توافق مع فكرة QR: المستخدم يصل إلى هذه الصفحة عبر الرمز، والأزرار تقود مباشرة للمتاجر.
    // إضافة رسالة سريعة للمطور في حال أراد تخصيص الروابط من خلال وحدة التحكم.
    console.log("✅ صفحة تحميل DFC - عربي | أزرار Google Play و App Store تعمل. استبدل الروابط بالروابط الرسمية للتطبيق.");
</script>
</body>
</html>
